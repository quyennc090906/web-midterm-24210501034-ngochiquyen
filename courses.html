<!DOCTYPE html>

<html>


<head>

<title>Khóa học</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">


<link rel="stylesheet" href="style.css">


</head>



<body onload="showCourses()">



<nav class="navbar bg-dark navbar-dark">

<div class="container">


</div>

</nav>



<div class="container mt-5">


<h1 class="text-center">

Danh sách khóa học

</h1>



<div class="row mb-4">


<div class="col-md-4">

<input 
id="search"
class="form-control"
placeholder="Tìm khóa học..."
onkeyup="filterCourses()">

</div>




<div class="col-md-4">


<select 
id="type"
class="form-control"
onchange="filterCourses()">


<option value="">
Tất cả danh mục
</option>


<option value="Frontend">
Frontend
</option>


<option value="Tool">
Tool
</option>


<option value="Design">
Design
</option>


<option value="Security">
Security
</option>


</select>


</div>





<div class="col-md-4">


<select 
id="level"
class="form-control"
onchange="filterCourses()">


<option value="">
Tất cả cấp độ
</option>


<option value="Dễ">
Dễ
</option>


<option value="Trung bình">
Trung bình
</option>


<option value="Khó">
Khó
</option>


</select>


</div>


</div>



<button 
class="btn btn-secondary mb-3"
onclick="resetFilter()">

Reset

</button>



<div class="row" id="list">


</div>



</div>
<!-- Modal -->


<div class="modal fade" id="myModal">


<div class="modal-dialog">


<div class="modal-content">



<div class="modal-header">


<h5 id="titleModal">

</h5>


<button 
class="btn-close"
data-bs-dismiss="modal">

</button>


</div>




<div class="modal-body">


<p id="contentModal">

</p>


</div>



</div>


</div>


</div>
<script 
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">

</script>




<script src="script.js"></script>


</body>


</html>
