<!DOCTYPE html>
<html>


<head>

<title>Đăng ký khóa học</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">


<link rel="stylesheet" href="style.css">


</head>


<body>



<nav class="navbar bg-dark navbar-dark">


<div class="container">

<a class="navbar-brand">

Quyển Academy

</a>


</div>


</nav>





<div class="container mt-5">


<h1 class="text-center">

Đăng ký khóa học

</h1>



<form id="formRegister">



<div class="mb-3">

<label>
Họ tên
</label>

<input 
id="name"
class="form-control">

</div>





<div class="mb-3">

<label>
Email
</label>

<input 
id="email"
class="form-control">

</div>





<div class="mb-3">

<label>
Số điện thoại
</label>

<input 
id="phone"
class="form-control">

</div>





<div class="mb-3">


<label>
Chọn khóa học
</label>


<select 
id="course"
class="form-control">


<option>
HTML CSS Cơ Bản
</option>


<option>
JavaScript Cơ Bản
</option>


<option>
Bootstrap
</option>


<option>
React
</option>


</select>


</div>





<button class="btn btn-primary">

Đăng ký

</button>



</form>


</div>





<script src="script.js"></script>


</body>


</html>
